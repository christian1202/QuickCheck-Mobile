<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 glass-header">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="hover:bg-surface-container-high p-2 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-2xl tracking-tight text-primary">Edit Member</h1>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500" data-icon="wifi_off">wifi_off</span>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border-2 border-white shadow-sm">
<img alt="Secretary Profile" class="w-full h-full object-cover" data-alt="Professional headshot of a woman in a business suit with a friendly expression and neutral office background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhx3JQs0btoWwIRsqDY-Fti7Va-bASGY9diFJczrbAIOd1B_tv1-i6bZ6FNmTPYiu1PybirDp0G2u2paOUxel3GFl9vC-DUnQWVt3_9xaapG1exPMaamj1urFXHR2YLyU_7CsKfk1r_Q4_CldTZUz4mBOoSa83_NLjzIYlUjBzAWVaKowqBMowdf4WBtk9PEe9ky71FnWu-GdhRQyiVWHEJ0RfNs5Nde6sPxxjqj-vd-hWAgTmescIPLpBAk7_u5RA9e01j7X2RcHe"/>
</div>
</div>
</div>
</header>
<main class="max-w-3xl mx-auto px-6 py-8">
<!-- Profile Photo Upload -->
<section class="flex flex-col items-center mb-12">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-white shadow-xl bg-surface-container-low transition-transform hover:scale-[1.02] active:scale-95">
<img class="w-full h-full object-cover" data-alt="Portrait of a young man with a warm smile, wearing a casual shirt, outdoors with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuSsyC3oJKm4pzHSrehyRmvwxmS9hMlOz7U8EItavadc3SsKYfGH18IwKlqIDTdWS1nQC2p0o1ALko63x8J4XdfXjDyRNOU-KgPTH5tgdRaXpBMee_yvsLiEXHD9unnJQoCBu1sHvsZ2XdrO0qUM7cXelF0Y7ZRe2bO2kP-M4TtDcnR93MN8S_qyF2EPkWV6vcwLYlKDo4ZUH534YJO15_VyuwlCH3yypvJJqgqvSbwrYFfIj_K2KmF_SS9sPwwgPl4GIwf8--A3By"/>
<div class="absolute inset-0 bg-primary/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
<p class="mt-4 font-label text-[0.75rem] uppercase tracking-wider text-slate-500 font-bold">Tap to change photo</p>
</section>
<!-- Form Content -->
<div class="space-y-10">
<!-- Personal Information Section -->
<div class="bg-surface-container-low p-8 rounded-2xl space-y-8">
<h2 class="font-headline text-lg font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">person</span>
                    Personal Identity
                </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Full Name</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium placeholder:text-slate-400" placeholder="Enter legal name" type="text" value="Marcus Thompson"/>
</div>
<!-- Contact Number -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Contact Number</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium" placeholder="+0 (000) 000-0000" type="tel" value="+1 (555) 902-3481"/>
</div>
<!-- Birthday -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Birthday</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium" type="date" value="1992-05-14"/>
</div>
</div>
<!-- Member Since -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Member Since</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium" type="date" value="2018-09-12"/>
</div>
</div>
</div>
<!-- Church Involvement Section -->
<div class="bg-surface-container-low p-8 rounded-2xl space-y-8">
<h2 class="font-headline text-lg font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">church</span>
                    Ministry Details
                </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Role -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Role in Church</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium" type="text" value="Worship Lead"/>
</div>
<!-- Ministry Group -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Ministry Group</label>
<select class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium appearance-none">
<option>Worship &amp; Creative Arts</option>
<option>Youth Ministry</option>
<option>Hospitality</option>
<option>Media &amp; Tech</option>
<option>Children's Church</option>
</select>
</div>
<!-- Status Selection - Bento Style -->
<div class="md:col-span-2 flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1 mb-2">Member Status</label>
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
<!-- Active -->
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-secondary bg-secondary-container/10 text-secondary font-bold transition-all">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                                Active
                            </button>
<!-- Inactive -->
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-transparent bg-surface-container-highest text-slate-500 font-medium hover:bg-slate-200 transition-all">
                                Inactive
                            </button>
<!-- On Leave -->
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-transparent bg-surface-container-highest text-slate-500 font-medium hover:bg-slate-200 transition-all">
                                On Leave
                            </button>
<!-- Transferred -->
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-transparent bg-surface-container-highest text-slate-500 font-medium hover:bg-slate-200 transition-all">
                                Transferred
                            </button>
</div>
</div>
</div>
</div>
<!-- Emergency Information -->
<div class="bg-surface-container-low p-8 rounded-2xl space-y-6">
<h2 class="font-headline text-lg font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">e911_emergency</span>
                    Safety &amp; Contact
                </h2>
<div class="flex flex-col gap-1.5">
<label class="font-label text-[0.75rem] font-bold text-on-surface-variant tracking-wider uppercase px-1">Emergency Contact</label>
<textarea class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary transition-all text-on-surface font-medium resize-none" placeholder="Name, Relationship, and Phone Number" rows="2">Sarah Thompson (Spouse) - +1 (555) 093-2210</textarea>
</div>
</div>
</div>
</main>
<!-- Sticky Save Button -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-white/80 backdrop-blur-xl border-t border-slate-100 p-6">
<div class="max-w-3xl mx-auto flex gap-4">
<button class="flex-1 py-4 px-6 rounded-xl font-headline font-bold text-primary bg-surface-container-high hover:bg-surface-container-highest transition-all active:scale-95">
                Discard Changes
            </button>
<button class="flex-[2] py-4 px-6 rounded-xl font-headline font-bold text-white bg-gradient-to-br from-primary to-primary-container shadow-lg shadow-primary/20 hover:shadow-xl hover:opacity-95 transition-all active:scale-95">
                Save Member Profile
            </button>
</div>
</div>
<!-- Navigation Shell Placeholder (Suppressed for transactional screen logic) -->
<!-- But if the system requires it for Top Level destinations, here is the BottomNavBar as an anchor -->
<div class="md:hidden">
<!-- The prompt asks for ADD/EDIT which is task-focused/transactional, so the BottomNavBar is suppressed per rules. -->
</div>
</body></html>
