<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: radial-gradient(circle at top right, #e6eeff 0%, #f8f9ff 100%);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar Fragment (Suppressing Nav for Transactional focus) -->
<header class="w-full px-6 py-8 max-w-7xl mx-auto flex justify-center md:justify-start">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-xl flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</div>
<span class="font-headline font-extrabold text-2xl tracking-tighter text-primary">QuickCheck</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-surface-container-low rounded-full blur-3xl opacity-60"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-80 h-80 bg-surface-container-highest rounded-full blur-3xl opacity-40"></div>
<div class="w-full max-w-md z-10">
<!-- Login Card Container -->
<div class="bg-surface-container-lowest rounded-3xl p-8 md:p-12 shadow-[0px_12px_32px_rgba(13,28,46,0.06)] transition-all">
<!-- Editorial Header -->
<div class="mb-10 text-center md:text-left">
<h1 class="font-headline font-bold text-3xl text-on-surface mb-2 tracking-tight">Welcome back</h1>
<p class="text-on-surface-variant font-medium">Please enter your details to continue.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- Email Field -->
<div class="group">
<label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl px-5 py-4 text-on-surface placeholder:text-outline font-medium transition-all" placeholder="name@company.com" type="email"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="group">
<div class="flex justify-between items-end mb-2 ml-1">
<label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant">Password</label>
<a class="text-[11px] font-bold uppercase tracking-wider text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl px-5 py-4 text-on-surface placeholder:text-outline font-medium transition-all" placeholder="••••••••" type="password"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined" data-icon="lock">lock</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 group" type="submit">
                        Log In
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-20"></div>
</div>
<span class="relative bg-surface-container-lowest px-4 font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline">or access with</span>
</div>
<!-- Biometric Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface border border-outline-variant border-opacity-20 hover:bg-surface-container-low rounded-xl py-3.5 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="fingerprint">fingerprint</span>
<span class="font-label text-xs font-bold uppercase tracking-wider text-on-surface">Touch ID</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface border border-outline-variant border-opacity-20 hover:bg-surface-container-low rounded-xl py-3.5 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="face">face</span>
<span class="font-label text-xs font-bold uppercase tracking-wider text-on-surface">Face ID</span>
</button>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-medium text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Contact Administrator</a>
</p>
</div>
</div>
</main>
<!-- Global Footer Minimal -->
<footer class="w-full px-6 py-8 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 border-t border-outline-variant border-opacity-10">
<p class="font-label text-[11px] font-medium text-outline uppercase tracking-widest">© 2024 QuickCheck Inc. Secure Portal</p>
<div class="flex gap-6">
<a class="font-label text-[11px] font-bold text-outline hover:text-primary uppercase tracking-widest transition-colors" href="#">Privacy Policy</a>
<a class="font-label text-[11px] font-bold text-outline hover:text-primary uppercase tracking-widest transition-colors" href="#">Terms of Service</a>
</div>
</footer>
<!-- Decorative Image Context (Asymmetric Layout element) -->
<div class="hidden lg:block fixed bottom-12 right-12 w-64 h-64 opacity-20 pointer-events-none">

</div>
</body></html>
